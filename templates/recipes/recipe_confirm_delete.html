{% extends "base/base.html" %}
{% block title %}Rezept löschen{% endblock %}
{% block page_title %}Rezept löschen{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="card p-8 text-center">
    <div class="font-display text-xl mb-2">{{ recipe.name }}</div>
    <div class="text-sm mb-8" style="color:rgba(240,237,232,0.5);">
      Dieses Rezept und alle zugehoerigen Zutatenmengen werden dauerhaft geloescht.
    </div>
    <div class="flex gap-3 justify-center">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Endgültig löschen</button>
      </form>
      <a href="{% url 'recipes:detail' pk=recipe.pk %}" class="btn btn-ghost">Abbrechen</a>
    </div>
  </div>
</div>
{% endblock %}
