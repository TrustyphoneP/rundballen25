<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden – rundballen25</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Outfit', sans-serif; font-weight: 300; }
  input { background:rgba(255,255,255,0.06)!important; border:1px solid rgba(240,237,232,0.12)!important;
          border-radius:8px!important; color:rgb(240,237,232)!important; padding:10px 14px!important;
          width:100%; outline:none!important; font-family:'Outfit',sans-serif!important; }
  input:focus { border-color:#3a7a8f!important; }
  input::placeholder { color:rgba(240,237,232,0.3)!important; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#122f38;">
  <div style="width:360px;">
    <div class="text-center mb-8">
      <div style="font-family:'DM Serif Display',serif; font-size:2rem; color:#f0ede8;">
        rundballen<span style="color:#e8a444;">24</span>
      </div>
      <div style="font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(240,237,232,0.4); margin-top:4px;">
        Freizeiten-Planung
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(240,237,232,0.09); border-radius:14px; padding:28px;">
      {% if form.errors %}
        <div style="background:rgba(224,123,84,0.1); border:1px solid rgba(224,123,84,0.3); border-radius:8px; padding:10px 14px; color:#e07b54; font-size:0.8rem; margin-bottom:16px;">
          Ungueltige Anmeldedaten.
        </div>
      {% endif %}
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-4">
          <label style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(240,237,232,0.4); display:block; margin-bottom:5px;">Benutzername</label>
          <input type="text" name="username" autofocus placeholder="Benutzername">
        </div>
        <div class="mb-6">
          <label style="font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(240,237,232,0.4); display:block; margin-bottom:5px;">Passwort</label>
          <input type="password" name="password" placeholder="Passwort">
        </div>
        <button type="submit" style="width:100%; background:#e8a444; color:#122f38; border:none; border-radius:8px; padding:10px; font-family:'Outfit',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer;">
          Anmelden
        </button>
      </form>
    </div>
  </div>
</body>
</html>
