<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danke – {{ poll.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Outfit',sans-serif; font-weight:300; background:#122f38; color:#f0ede8; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="max-w-md text-center px-6">
    <div style="font-family:'DM Serif Display',serif; font-size:2.5rem; margin-bottom:12px;">
      Danke!
    </div>
    <div style="color:rgba(240,237,232,0.55); margin-bottom:32px; line-height:1.6;">
      Deine Stimme wurde gezaehlt.
    </div>

    {% if votes %}
    <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(240,237,232,0.09);
                border-radius:14px; padding:20px; margin-bottom:24px; text-align:left;">
      <div style="font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
                  color:rgba(240,237,232,0.4); margin-bottom:12px; font-family:'DM Mono',monospace;">
        Deine Auswahl
      </div>
      {% for vote in votes %}
      <div style="padding:8px 0; border-bottom:1px solid rgba(240,237,232,0.05); font-size:0.85rem;">
        {{ vote.vote_recipe.name }}
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(240,237,232,0.09);
                border-radius:14px; padding:20px; margin-bottom:24px; color:rgba(240,237,232,0.4);">
      Du hast keine Gerichte ausgewaehlt.
    </div>
    {% endif %}

    <div style="font-size:0.75rem; color:rgba(240,237,232,0.25);">
      Diese Seite kann geschlossen werden.
    </div>
  </div>
</body>
</html>
